<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türk Tarihi Atlası — KPSS Tarih İnteraktif Harita</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,0.3);--gold-bright:#e8c55a;
  --bg-dark:#080c14;--bg-mid:#0e1520;--bg-light:#141e2e;
  --text:#ddd5c4;--text-dim:rgba(221,213,196,0.5);
  --red:#d94040;--red-dim:rgba(217,64,64,0.3);
  --turk:#c9a84c;--enemy:#7a8ba0;
  --blue:#4a7ab5;--green:#4a9;--purple:#8a6abf;
}
html,body{height:100%;overflow:hidden;background:var(--bg-dark);color:var(--text);font-family:'Crimson Text',Georgia,serif}
#app{display:flex;flex-direction:column;height:100vh}

/* HEADER */
#header{flex-shrink:0;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(90deg,rgba(201,168,76,0.08),rgba(201,168,76,0.03),rgba(201,168,76,0.08));
  border-bottom:1px solid var(--gold-dim);z-index:20}
#header h1{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold);letter-spacing:4px;text-transform:uppercase}
#header .sub{font-size:10px;color:var(--text-dim);letter-spacing:1.5px;margin-top:2px}
#era-badge{padding:6px 16px;background:rgba(201,168,76,0.1);border:1px solid var(--gold-dim);border-radius:4px;
  font-family:'Cinzel',serif;font-size:13px;color:var(--gold);text-align:center;max-width:400px;
  animation:glowPulse 3s infinite}

/* MAIN AREA */
#main{flex:1;display:flex;overflow:hidden;position:relative}

/* MAP */
#map-container{flex:1;position:relative;overflow:hidden;background:var(--bg-dark)}
#map-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.12;
  filter:hue-rotate(30deg) saturate(0.5) brightness(0.8)}
#map-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#map-overlay *{pointer-events:auto}

.state-marker{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:5;transition:all 0.3s}
.state-marker:hover{z-index:10;transform:translate(-50%,-50%) scale(1.2)}
.marker-dot{width:16px;height:16px;border-radius:50%;position:relative}
.marker-dot.turk{background:radial-gradient(circle,var(--gold-bright),var(--gold));
  box-shadow:0 0 12px rgba(201,168,76,0.6),0 0 30px rgba(201,168,76,0.2);animation:pulse 2.5s infinite}
.marker-dot.enemy{background:radial-gradient(circle,#9ab,var(--enemy));
  box-shadow:0 0 8px rgba(122,139,160,0.4)}
.marker-dot.turk-islam{background:radial-gradient(circle,#5cb85c,#3a8);
  box-shadow:0 0 12px rgba(74,170,153,0.5);animation:pulse 2.5s infinite}
.marker-label{position:absolute;top:-22px;left:50%;transform:translateX(-50%);white-space:nowrap;
  font-family:'Cinzel',serif;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;
  text-shadow:0 1px 3px rgba(0,0,0,0.8);pointer-events:none}
.marker-label.turk{color:var(--gold)}
.marker-label.turk-islam{color:#5cb85c}
.marker-label.enemy{color:#9ab}
.marker-ring{position:absolute;top:-6px;left:-6px;width:28px;height:28px;border-radius:50%;
  border:2px solid transparent;animation:ringPulse 3s infinite}
.marker-ring.turk{border-color:rgba(201,168,76,0.4)}
.marker-ring.turk-islam{border-color:rgba(74,170,153,0.4)}

/* WAR LINES */
.war-line{position:absolute;z-index:3;pointer-events:none}
.war-badge{position:absolute;transform:translate(-50%,-50%);z-index:6;cursor:pointer;
  background:rgba(217,64,64,0.15);border:1px solid var(--red-dim);border-radius:12px;
  padding:2px 8px;font-size:9px;color:#f87171;white-space:nowrap;
  font-family:'Noto Sans',sans-serif;font-weight:600;animation:warPulse 2s infinite;
  transition:all 0.2s}
.war-badge:hover{background:rgba(217,64,64,0.3);transform:translate(-50%,-50%) scale(1.1)}

/* LEGEND */
#legend{position:absolute;top:12px;left:12px;padding:10px 14px;background:rgba(8,12,20,0.9);
  border:1px solid var(--gold-dim);border-radius:6px;font-size:11px;z-index:10;
  backdrop-filter:blur(10px)}
#legend .item{display:flex;align-items:center;gap:8px;margin-bottom:5px}
#legend .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* INFO BOX (bottom) */
#info-box{position:absolute;bottom:80px;left:16px;right:16px;padding:14px 18px;
  background:linear-gradient(135deg,rgba(8,12,20,0.94),rgba(14,21,32,0.92));
  border:1px solid var(--gold-dim);border-radius:8px;backdrop-filter:blur(10px);
  z-index:10;animation:fadeIn 0.4s;transition:right 0.3s}
#info-box.shifted{right:420px}
#info-box h2{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);margin-bottom:4px;letter-spacing:1px}
#info-box p{font-size:13px;color:rgba(221,213,196,0.7);line-height:1.5}
#info-wars{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.info-war-tag{padding:3px 8px;background:rgba(217,64,64,0.1);border:1px solid var(--red-dim);
  border-radius:10px;font-size:10px;color:#f87171;cursor:pointer;transition:all 0.2s;
  font-family:'Noto Sans',sans-serif}
.info-war-tag:hover{background:rgba(217,64,64,0.25)}

/* DETAIL PANEL */
#detail-panel{width:0;overflow:hidden;flex-shrink:0;background:linear-gradient(180deg,rgba(14,21,32,0.98),rgba(8,12,20,0.98));
  border-left:1px solid var(--gold-dim);transition:width 0.3s;z-index:15}
#detail-panel.open{width:400px;overflow-y:auto}
#detail-header{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--gold-dim);position:sticky;top:0;background:inherit;z-index:2}
#detail-header h3{font-family:'Cinzel',serif;font-size:14px;letter-spacing:1px}
#detail-close{background:none;border:1px solid rgba(221,213,196,0.2);color:var(--text);cursor:pointer;
  padding:4px 10px;border-radius:4px;font-size:12px;transition:all 0.2s}
#detail-close:hover{border-color:var(--gold);color:var(--gold)}
#detail-content{padding:16px 18px}

.detail-section{margin-bottom:16px}
.detail-section-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:1.5px;
  margin-bottom:8px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.detail-period{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.15);
  border-radius:6px;padding:10px 14px;margin-bottom:14px}
.detail-period .label{font-size:10px;color:rgba(201,168,76,0.6);letter-spacing:1px}
.detail-period .value{font-size:14px;color:var(--text);margin-top:3px}
.tag-list{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:3px 10px;border-radius:16px;font-size:11px;font-family:'Noto Sans',sans-serif}
.tag.leader{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);color:rgba(232,200,120,0.9)}
.tag.culture{background:rgba(138,106,191,0.1);border:1px solid rgba(138,106,191,0.25);color:rgba(196,170,255,0.9)}
.tag.scientist{background:rgba(74,170,153,0.1);border:1px solid rgba(74,170,153,0.2);color:rgba(134,239,200,0.9)}
.achievement-item{padding:7px 12px;margin-bottom:3px;border-left:2px solid var(--gold-dim);
  font-size:12px;color:rgba(221,213,196,0.75);line-height:1.5;font-family:'Noto Sans',sans-serif}
.achievement-item:nth-child(odd){background:rgba(201,168,76,0.03)}
.event-timeline{border-left:2px solid var(--gold-dim);padding-left:14px}
.event-item{position:relative;padding-bottom:10px;font-size:12px;color:rgba(221,213,196,0.75);
  line-height:1.5;font-family:'Noto Sans',sans-serif}
.event-item::before{content:'';position:absolute;left:-19px;top:5px;width:8px;height:8px;
  border-radius:50%;background:rgba(201,168,76,0.5);border:2px solid var(--gold-dim)}

/* TIMELINE */
#timeline{flex-shrink:0;padding:8px 20px 12px;
  background:linear-gradient(0deg,rgba(8,12,20,0.98),rgba(14,21,32,0.95));
  border-top:1px solid var(--gold-dim);z-index:20}
#timeline-controls{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ctrl-btn{background:rgba(201,168,76,0.1);border:1px solid var(--gold-dim);color:var(--gold);
  cursor:pointer;padding:5px 12px;border-radius:4px;font-family:'Cinzel',serif;font-size:13px;
  transition:all 0.2s;user-select:none}
.ctrl-btn:hover{background:rgba(201,168,76,0.2)}
.ctrl-btn.play{background:rgba(74,170,153,0.15);border-color:rgba(74,170,153,0.4);color:#6ee7b7}
.ctrl-btn.pause{background:rgba(217,64,64,0.15);border-color:rgba(217,64,64,0.4);color:#fca5a5}
#speed-control{display:flex;align-items:center;gap:6px;margin-left:12px;font-size:11px;color:var(--text-dim)}
#speed-slider{width:80px;accent-color:var(--gold)}
#period-counter{font-size:11px;color:var(--text-dim);margin-left:auto}

#timeline-bar{position:relative;display:flex;align-items:center;height:40px}
#timeline-track{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(201,168,76,0.12);transform:translateY(-50%)}
#timeline-progress{position:absolute;top:50%;left:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-bright));
  transform:translateY(-50%);transition:width 0.4s}
.timeline-dot{position:absolute;top:50%;transform:translate(-50%,-50%);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;z-index:2;transition:all 0.3s}
.timeline-dot .dot{width:10px;height:10px;border-radius:50%;transition:all 0.3s;
  border:2px solid transparent}
.timeline-dot.active .dot{width:16px;height:16px;background:var(--gold);
  border:3px solid rgba(201,168,76,0.4);box-shadow:0 0 12px rgba(201,168,76,0.5)}
.timeline-dot.passed .dot{background:var(--gold)}
.timeline-dot.future .dot{background:rgba(100,116,139,0.4)}
.timeline-dot .year-label{font-family:'Cinzel',serif;font-size:8px;margin-top:4px;
  white-space:nowrap;transition:all 0.3s;color:var(--text-dim)}
.timeline-dot.active .year-label{font-size:10px;color:var(--gold);font-weight:700}

/* ANIMATIONS */
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:0.7}}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.5);opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes warPulse{0%,100%{opacity:0.7}50%{opacity:1}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(201,168,76,0.2)}50%{box-shadow:0 0 20px rgba(201,168,76,0.5)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.2)}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:3px}

/* WAR DETAIL */
.war-detail-box{padding:14px;background:rgba(217,64,64,0.06);border:1px solid var(--red-dim);
  border-radius:8px;margin-bottom:12px}
.war-detail-box .title{font-family:'Cinzel',serif;font-size:16px;color:#f87171;margin-bottom:6px}
.war-detail-box .meta{font-size:13px;color:var(--text);margin-bottom:4px}
.war-detail-box .sides{margin-top:10px;font-size:12px;color:rgba(221,213,196,0.7)}

@media(max-width:768px){
  #detail-panel.open{width:100%;position:absolute;top:0;right:0;bottom:0;z-index:30}
  #info-box.shifted{right:16px}
  .marker-label{font-size:8px}
  #era-badge{font-size:10px;max-width:200px}
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <h1>⚔ Türk Tarihi Atlası</h1>
      <div class="sub">MÖ 220'DEN CUMHURİYET'E • KPSS TARİH İNTERAKTİF KRONOLOJİ</div>
    </div>
    <div id="era-badge"></div>
  </div>
  <div id="main">
    <div id="map-container">
      <img id="map-bg" src="world.svg" alt="Dünya Haritası">
      <div id="map-overlay"></div>
      <div id="legend">
        <div class="item"><div class="dot" style="background:var(--gold);box-shadow:0 0 6px rgba(201,168,76,0.5)"></div><span style="color:var(--gold)">Türk Devleti</span></div>
        <div class="item"><div class="dot" style="background:#4a9;box-shadow:0 0 6px rgba(74,170,153,0.4)"></div><span style="color:#6ee7b7">Türk-İslam Devleti</span></div>
        <div class="item"><div class="dot" style="background:var(--enemy)"></div><span style="color:#9ab">Diğer Devletler</span></div>
        <div class="item"><div class="dot" style="background:var(--red)"></div><span style="color:#f87171">Savaş / Çatışma</span></div>
        <div style="margin-top:4px;color:var(--text-dim);font-size:10px;font-style:italic">Devletlere ve savaşlara tıklayın</div>
      </div>
      <div id="info-box">
        <h2 id="info-era"></h2>
        <p id="info-desc"></p>
        <div id="info-wars"></div>
      </div>
    </div>
    <div id="detail-panel">
      <div id="detail-header">
        <h3 id="detail-title"></h3>
        <button id="detail-close" onclick="closePanel()">✕ Kapat</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>
  <div id="timeline">
    <div id="timeline-controls">
      <button class="ctrl-btn" onclick="prevPeriod()">◀ Geri</button>
      <button class="ctrl-btn play" id="play-btn" onclick="togglePlay()">▶ Oynat</button>
      <button class="ctrl-btn" onclick="nextPeriod()">İleri ▶</button>
      <div id="speed-control">
        <span>Hız:</span>
        <input type="range" id="speed-slider" min="1" max="10" value="4">
        <span id="speed-label">4s</span>
      </div>
      <div id="period-counter"></div>
    </div>
    <div id="timeline-bar"></div>
  </div>
</div>

<script>
// ============================================================
// MILLER PROJECTION COORDINATE CONVERTER
// ============================================================
function geoToPercent(lat, lon) {
  const xSvg = 380.19 + lon * 2.1127;
  const latRad = lat * Math.PI / 180;
  const yMiller = 1.25 * Math.log(Math.tan(Math.PI / 4 + 0.4 * latRad));
  const ySvg = 278 - yMiller * 121.0;
  // Crop view: x 300-760, y 50-400
  const xPct = (xSvg - 300) / (760 - 300) * 100;
  const yPct = (ySvg - 50) / (400 - 50) * 100;
  return { x: Math.max(0, Math.min(100, xPct)), y: Math.max(0, Math.min(100, yPct)) };
}

// ============================================================
// UYGULAMA MANTIĞI VE HARİTA KONTROLLERİ
// ============================================================
let currentIndex = 0;
let playing = false;
let playTimer = null;
let speedSeconds = parseInt(document.getElementById('speed-slider').value);

const overlay = document.getElementById('map-overlay');
const infoEra = document.getElementById('info-era');
const infoDesc = document.getElementById('info-desc');
const infoWars = document.getElementById('info-wars');
const timelineBar = document.getElementById('timeline-bar');
const timelineProgress = document.getElementById('timeline-progress');
const periodCounter = document.getElementById('period-counter');
const eraBadge = document.getElementById('era-badge');
const playBtn = document.getElementById('play-btn');
const speedSlider = document.getElementById('speed-slider');
const speedLabel = document.getElementById('speed-label');
const detailPanel = document.getElementById('detail-panel');
const detailTitle = document.getElementById('detail-title');
const detailContent = document.getElementById('detail-content');
const infoBox = document.getElementById('info-box');

function init() {
  // Zaman Çizelgesi (Timeline) Çizgisini Oluştur
  const track = document.createElement('div');
  track.id = 'timeline-track';
  timelineBar.appendChild(track);
  timelineBar.appendChild(timelineProgress);

  // Dönem noktalarını (Timeline Dots) oluştur
  PERIODS.forEach((p, idx) => {
    const dot = document.createElement('div');
    dot.className = 'timeline-dot future';
    dot.style.left = `${(idx / (PERIODS.length - 1)) * 100}%`;
    dot.onclick = () => goToPeriod(idx);
    
    const innerDot = document.createElement('div');
    innerDot.className = 'dot';
    
    const label = document.createElement('div');
    label.className = 'year-label';
    label.innerText = p.label;
    
    dot.appendChild(innerDot);
    dot.appendChild(label);
    timelineBar.appendChild(dot);
  });

  // Hız ayarı dinleyicisi
  speedSlider.addEventListener('input', (e) => {
    speedSeconds = parseInt(e.target.value);
    speedLabel.innerText = speedSeconds + 's';
    if(playing) {
      pause(); play();
    }
  });

  // Başlangıç dönemini yükle
  goToPeriod(0);
}

function goToPeriod(index) {
  if(index < 0 || index >= PERIODS.length) return;
  currentIndex = index;
  const period = PERIODS[currentIndex];

  // Arayüz metinlerini güncelle
  infoEra.innerText = period.year + " - " + period.era;
  infoDesc.innerText = period.description;
  eraBadge.innerText = period.era;
  periodCounter.innerText = `${currentIndex + 1} / ${PERIODS.length}`;

  // Zaman Çizelgesi CSS sınıflarını güncelle
  const dots = document.querySelectorAll('.timeline-dot');
  dots.forEach((dot, idx) => {
    dot.className = 'timeline-dot';
    if (idx < currentIndex) dot.classList.add('passed');
    else if (idx === currentIndex) dot.classList.add('active');
    else dot.classList.add('future');
  });
  timelineProgress.style.width = `${(currentIndex / (PERIODS.length - 1)) * 100}%`;

  drawMap(period);
  closePanel();
}

function drawMap(period) {
  overlay.innerHTML = '';
  infoWars.innerHTML = '';

  // Savaş Çizgileri için SVG Altlığı
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.style.position = 'absolute';
  svg.style.top = '0';
  svg.style.left = '0';
  svg.style.width = '100%';
  svg.style.height = '100%';
  svg.style.pointerEvents = 'none';
  svg.style.zIndex = '2';
  overlay.appendChild(svg);

  // Devletleri Çiz
  if(period.states) {
    period.states.forEach(state => createMarker(state));
  }

  // Düşmanları Çiz
  if(period.enemies) {
    period.enemies.forEach(enemy => createMarker(enemy));
  }

  // Savaşları Çiz (Oklar ve Etiketler)
  if(period.wars) {
    period.wars.forEach(war => {
      // Bilgi Kutusundaki (Alttaki) savaş etiketleri
      const tag = document.createElement('div');
      tag.className = 'info-war-tag';
      tag.innerText = `⚔ ${war.name} (${war.year})`;
      tag.onclick = () => openWarDetail(war);
      infoWars.appendChild(tag);

      // Harita üzerindeki oklar ve çarpışma animasyonları
      const fromState = period.states ? period.states.find(s => s.name === war.from) : null;
      let toState = period.enemies ? period.enemies.find(s => s.name === war.to) : null;
      
      // Eğer hedef düşmanlar arasında değil de başka bir devlette ise
      if (!toState && period.states) {
        toState = period.states.find(s => s.name === war.to);
      }
      
      if(fromState && toState) {
        const p1 = geoToPercent(fromState.lat, fromState.lon);
        const p2 = geoToPercent(toState.lat, toState.lon);
        
        // Savaş rozeti ortada çıksın
        const midX = (p1.x + p2.x) / 2;
        const midY = (p1.y + p2.y) / 2;

        const badge = document.createElement('div');
        badge.className = 'war-badge';
        badge.style.left = `${midX}%`;
        badge.style.top = `${midY}%`;
        badge.innerText = `⚔ ${war.name}`;
        badge.onclick = () => openWarDetail(war);
        overlay.appendChild(badge);

        // Çarpışan iki devlet arasına kesik çizgi çiz
        const lineNode = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        lineNode.setAttribute('x1', `${p1.x}%`);
        lineNode.setAttribute('y1', `${p1.y}%`);
        lineNode.setAttribute('x2', `${p2.x}%`);
        lineNode.setAttribute('y2', `${p2.y}%`);
        lineNode.setAttribute('stroke', 'rgba(217, 64, 64, 0.4)');
        lineNode.setAttribute('stroke-width', '2');
        lineNode.setAttribute('stroke-dasharray', '5 5');
        svg.appendChild(lineNode);
      }
    });
  }
}

function createMarker(item) {
  const pos = geoToPercent(item.lat, item.lon);
  
  const wrapper = document.createElement('div');
  wrapper.className = 'state-marker';
  wrapper.style.left = `${pos.x}%`;
  wrapper.style.top = `${pos.y}%`;
  wrapper.onclick = () => openDetail(item);

  const ring = document.createElement('div');
  ring.className = `marker-ring ${item.type}`;
  
  const dot = document.createElement('div');
  dot.className = `marker-dot ${item.type}`;
  
  const label = document.createElement('div');
  label.className = `marker-label ${item.type}`;
  label.innerText = item.name;

  wrapper.appendChild(ring);
  wrapper.appendChild(dot);
  wrapper.appendChild(label);
  overlay.appendChild(wrapper);
}

function openDetail(item) {
  detailTitle.innerText = item.name;
  
  let html = '';
  if(item.details) {
    const d = item.details;
    
    if(d.period || d.capital) {
      html += `<div class="detail-period">
        ${d.period ? `<div class="label">DÖNEM</div><div class="value">${d.period}</div><br>` : ''}
        ${d.capital ? `<div class="label">BAŞKENT / MERKEZ</div><div class="value">${d.capital}</div>` : ''}
      </div>`;
    }

    if(d.leaders && d.leaders.length > 0) {
      html += `<div class="detail-section">
        <div class="detail-section-title">👑 Önemli Liderler</div>
        <div class="tag-list">
          ${d.leaders.map(l => `<span class="tag leader">${l}</span>`).join('')}
        </div>
      </div>`;
    }

    if(d.achievements && d.achievements.length > 0) {
      html += `<div class="detail-section">
        <div class="detail-section-title">🏆 Başarılar & Özellikler</div>
        ${d.achievements.map(a => `<div class="achievement-item">${a}</div>`).join('')}
      </div>`;
    }

    if(d.culture && d.culture.length > 0) {
      html += `<div class="detail-section">
        <div class="detail-section-title">🏛 Kültür & Medeniyet</div>
        <div class="tag-list">
          ${d.culture.map(c => `<span class="tag culture">${c}</span>`).join('')}
        </div>
      </div>`;
    }

    if(d.scientists && d.scientists.length > 0) {
      html += `<div class="detail-section">
        <div class="detail-section-title">📜 Bilim İnsanları / Düşünürler</div>
        <div class="tag-list">
          ${d.scientists.map(s => `<span class="tag scientist">${s}</span>`).join('')}
        </div>
      </div>`;
    }

    if(d.events && d.events.length > 0) {
      html += `<div class="detail-section">
        <div class="detail-section-title">📅 Kronolojik Olaylar</div>
        <div class="event-timeline">
          ${d.events.map(e => `<div class="event-item">${e}</div>`).join('')}
        </div>
      </div>`;
    }
  } else {
    html = '<p style="color:var(--text-dim)">Detaylı bilgi bulunmuyor.</p>';
  }

  detailContent.innerHTML = html;
  detailPanel.classList.add('open');
  infoBox.classList.add('shifted');
}

function openWarDetail(war) {
  detailTitle.innerText = "Savaş Detayı";
  detailContent.innerHTML = `
    <div class="war-detail-box">
      <div class="title">${war.name}</div>
      <div class="meta"><strong>Tarih:</strong> ${war.year}</div>
      <div class="meta" style="color:#6ee7b7"><strong>Sonuç:</strong> ${war.result}</div>
      <div class="sides"><strong>Taraflar:</strong> ${war.from} ⚔ ${war.to}</div>
    </div>
  `;
  detailPanel.classList.add('open');
  infoBox.classList.add('shifted');
}

function closePanel() {
  detailPanel.classList.remove('open');
  infoBox.classList.remove('shifted');
}

function nextPeriod() {
  if(currentIndex < PERIODS.length - 1) goToPeriod(currentIndex + 1);
  else { pause(); goToPeriod(0); }
}

function prevPeriod() {
  if(currentIndex > 0) goToPeriod(currentIndex - 1);
}

function togglePlay() {
  if(playing) pause();
  else play();
}

function play() {
  playing = true;
  playBtn.innerHTML = '⏸ Durdur';
  playBtn.classList.remove('play');
  playBtn.classList.add('pause');
  
  if(currentIndex >= PERIODS.length - 1) goToPeriod(0);
  
  playTimer = setInterval(() => {
    if(currentIndex < PERIODS.length - 1) goToPeriod(currentIndex + 1);
    else pause();
  }, speedSeconds * 1000);
}

function pause() {
  playing = false;
  playBtn.innerHTML = '▶ Oynat';
  playBtn.classList.remove('pause');
  playBtn.classList.add('play');
  clearInterval(playTimer);
}

// Sayfa yüklendiğinde sistemi başlat
window.onload = init;
</script>
</body>
</html>
