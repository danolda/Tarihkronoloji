<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türk Tarihi Atlası — KPSS Tarih İnteraktif Harita</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,0.3);--gold-bright:#e8c55a;
  --bg-dark:#080c14;--bg-mid:#0e1520;--bg-light:#141e2e;
  --text:#ddd5c4;--text-dim:rgba(221,213,196,0.5);
  --red:#d94040;--red-dim:rgba(217,64,64,0.3);
  --turk:#c9a84c;--enemy:#7a8ba0;
  --blue:#4a7ab5;--green:#4a9;--purple:#8a6abf;
}
html,body{height:100%;overflow:hidden;background:var(--bg-dark);color:var(--text);font-family:'Crimson Text',Georgia,serif}
#app{display:flex;flex-direction:column;height:100vh}

#header{flex-shrink:0;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(90deg,rgba(201,168,76,0.08),rgba(201,168,76,0.03),rgba(201,168,76,0.08));
  border-bottom:1px solid var(--gold-dim);z-index:20}
#header h1{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase}
#header .sub{font-size:10px;color:var(--text-dim);letter-spacing:1.5px;margin-top:2px}
#era-badge{padding:6px 14px;background:rgba(201,168,76,0.1);border:1px solid var(--gold-dim);border-radius:4px;
  font-family:'Cinzel',serif;font-size:12px;color:var(--gold);text-align:center;max-width:420px;
  animation:glowPulse 3s infinite;line-height:1.3}

#main{flex:1;display:flex;overflow:hidden;position:relative}

#map-container{flex:1;background:var(--bg-dark);display:flex;align-items:center;justify-content:center;overflow:hidden}
#map-scaler{position:relative;width:100%;max-width:1400px;aspect-ratio:2000/857}
#map-svg-wrap{position:absolute;top:0;left:0;width:100%;height:100%}
#map-svg-wrap svg{width:100%;height:100%;opacity:0.85;filter:saturate(0.6) brightness(0.6);transition:all 0.5s ease}
#map-svg-wrap svg path{transition:fill 0.5s ease,stroke 0.5s ease;stroke:rgba(255,255,255,0.08);stroke-width:0.5}
#map-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#map-overlay *{pointer-events:auto}

.state-marker{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:5;transition:all 0.3s ease}
.state-marker:hover{z-index:10;transform:translate(-50%,-50%) scale(1.25)}
.marker-dot{width:14px;height:14px;border-radius:50%;position:relative;transition:all 0.3s}
.marker-dot.turk{background:radial-gradient(circle,var(--gold-bright),var(--gold));
  box-shadow:0 0 10px rgba(201,168,76,0.6),0 0 25px rgba(201,168,76,0.15);animation:pulse 2.5s infinite}
.marker-dot.enemy{background:radial-gradient(circle,#9ab,var(--enemy));box-shadow:0 0 6px rgba(122,139,160,0.3)}
.marker-dot.turk-islam{background:radial-gradient(circle,#5cb85c,#3a8);
  box-shadow:0 0 10px rgba(74,170,153,0.4);animation:pulse 2.5s infinite}
.marker-dot.turk2{background:radial-gradient(circle,#f0a050,#d08030);
  box-shadow:0 0 10px rgba(240,160,80,0.5);animation:pulse 2.5s infinite}
.marker-dot.turk3{background:radial-gradient(circle,#e06090,#c04070);
  box-shadow:0 0 10px rgba(224,96,144,0.5);animation:pulse 2.5s infinite}
.marker-dot.turk4{background:radial-gradient(circle,#60c0f0,#40a0d0);
  box-shadow:0 0 10px rgba(96,192,240,0.5);animation:pulse 2.5s infinite}
.marker-dot.turk5{background:radial-gradient(circle,#c090f0,#a070d0);
  box-shadow:0 0 10px rgba(192,144,240,0.5);animation:pulse 2.5s infinite}
.marker-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);white-space:nowrap;
  font-family:'Cinzel',serif;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;
  text-shadow:0 1px 4px rgba(0,0,0,0.9);pointer-events:none}
.marker-label.turk{color:var(--gold)}
.marker-label.turk-islam{color:#6ee7b7}
.marker-label.turk2{color:#f0a050}
.marker-label.turk3{color:#e06090}
.marker-label.turk4{color:#60c0f0}
.marker-label.turk5{color:#c090f0}
.marker-label.enemy{color:#9ab}
.marker-sub{position:absolute;top:18px;left:50%;transform:translateX(-50%);white-space:nowrap;
  font-size:7px;color:var(--text-dim);pointer-events:none;font-family:'Noto Sans',sans-serif}
.marker-ring{position:absolute;top:-5px;left:-5px;width:24px;height:24px;border-radius:50%;
  border:2px solid transparent;animation:ringPulse 3s infinite}
.marker-ring.turk{border-color:rgba(201,168,76,0.35)}
.marker-ring.turk-islam{border-color:rgba(74,170,153,0.35)}
.marker-ring.turk2{border-color:rgba(240,160,80,0.35)}
.marker-ring.turk3{border-color:rgba(224,96,144,0.35)}
.marker-ring.turk4{border-color:rgba(96,192,240,0.35)}
.marker-ring.turk5{border-color:rgba(192,144,240,0.35)}

.capital-label{position:absolute;top:20px;left:50%;transform:translateX(-50%);white-space:nowrap;
  font-size:7px;color:rgba(255,255,255,0.55);pointer-events:none;font-family:'Noto Sans',sans-serif;
  font-style:italic}

.war-badge{position:absolute;transform:translate(-50%,-50%);z-index:6;cursor:pointer;
  background:rgba(217,64,64,0.12);border:1px solid var(--red-dim);border-radius:12px;
  padding:2px 7px;font-size:8px;color:#f87171;white-space:nowrap;
  font-family:'Noto Sans',sans-serif;font-weight:600;animation:warPulse 2s infinite;transition:all 0.2s}
.war-badge:hover{background:rgba(217,64,64,0.3);transform:translate(-50%,-50%) scale(1.12)}

#legend{position:absolute;top:10px;left:10px;padding:8px 12px;background:rgba(8,12,20,0.92);
  border:1px solid var(--gold-dim);border-radius:6px;font-size:10px;z-index:10;backdrop-filter:blur(10px)}
#legend .item{display:flex;align-items:center;gap:7px;margin-bottom:4px}
#legend .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

#info-box{position:absolute;bottom:6px;left:12px;right:12px;padding:12px 16px;
  background:linear-gradient(135deg,rgba(8,12,20,0.95),rgba(14,21,32,0.93));
  border:1px solid var(--gold-dim);border-radius:8px;backdrop-filter:blur(10px);
  z-index:10;animation:fadeIn 0.4s;transition:right 0.3s}
#info-box.shifted{right:410px}
#info-box h2{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);margin-bottom:3px;letter-spacing:1px}
#info-box p{font-size:12px;color:rgba(221,213,196,0.7);line-height:1.4}
#info-wars{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.info-war-tag{padding:2px 7px;background:rgba(217,64,64,0.1);border:1px solid var(--red-dim);
  border-radius:10px;font-size:9px;color:#f87171;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans',sans-serif}
.info-war-tag:hover{background:rgba(217,64,64,0.25)}

#detail-panel{width:0;overflow:hidden;flex-shrink:0;
  background:linear-gradient(180deg,rgba(14,21,32,0.99),rgba(8,12,20,0.99));
  border-left:1px solid var(--gold-dim);transition:width 0.3s ease;z-index:15;
  display:flex;flex-direction:column;height:100%}
#detail-panel.open{width:420px}
#detail-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--gold-dim);background:inherit;flex-shrink:0}
#detail-header h3{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;flex:1;margin-right:8px}
#detail-close{background:none;border:1px solid rgba(221,213,196,0.2);color:var(--text);cursor:pointer;
  padding:3px 10px;border-radius:4px;font-size:11px;transition:all 0.2s;white-space:nowrap}
#detail-close:hover{border-color:var(--gold);color:var(--gold)}
#detail-content{padding:14px 16px;flex:1;overflow-y:auto}

.detail-section{margin-bottom:14px}
.detail-section-title{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:1.5px;
  margin-bottom:6px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.detail-period{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.12);
  border-radius:6px;padding:8px 12px;margin-bottom:12px}
.detail-period .label{font-size:9px;color:rgba(201,168,76,0.5);letter-spacing:1px}
.detail-period .value{font-size:13px;color:var(--text);margin-top:2px}
.detail-capital{background:rgba(74,170,153,0.06);border:1px solid rgba(74,170,153,0.15);
  border-radius:6px;padding:6px 12px;margin-bottom:12px;font-size:11px;color:#6ee7b7}
.detail-significance{background:rgba(201,168,76,0.04);border-left:3px solid var(--gold-dim);
  padding:8px 12px;margin-bottom:12px;font-size:11px;color:rgba(221,213,196,0.8);line-height:1.5;
  font-family:'Noto Sans',sans-serif;font-style:italic}
.tag-list{display:flex;flex-wrap:wrap;gap:4px}
.tag{padding:2px 8px;border-radius:14px;font-size:10px;font-family:'Noto Sans',sans-serif}
.tag.leader{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.18);color:rgba(232,200,120,0.85)}
.tag.culture{background:rgba(138,106,191,0.08);border:1px solid rgba(138,106,191,0.2);color:rgba(196,170,255,0.85)}
.tag.scientist{background:rgba(74,170,153,0.08);border:1px solid rgba(74,170,153,0.18);color:rgba(134,239,200,0.85)}
.tag.arch{background:rgba(217,160,64,0.08);border:1px solid rgba(217,160,64,0.18);color:rgba(240,200,120,0.85)}
.achievement-item{padding:5px 10px;margin-bottom:2px;border-left:2px solid var(--gold-dim);
  font-size:11px;color:rgba(221,213,196,0.72);line-height:1.45;font-family:'Noto Sans',sans-serif}
.achievement-item:nth-child(odd){background:rgba(201,168,76,0.02)}
.scientist-item{padding:6px 10px;margin-bottom:4px;border-left:2px solid rgba(74,170,153,0.4);
  font-size:11px;color:rgba(221,213,196,0.75);line-height:1.5;font-family:'Noto Sans',sans-serif;
  background:rgba(74,170,153,0.03)}
.scientist-item .sci-name{color:#6ee7b7;font-weight:600}
.scientist-item .sci-work{color:rgba(221,213,196,0.6);font-style:italic;display:block;margin-top:2px}
.arch-item{padding:6px 10px;margin-bottom:4px;border-left:2px solid rgba(217,160,64,0.4);
  font-size:11px;color:rgba(221,213,196,0.75);line-height:1.5;font-family:'Noto Sans',sans-serif;
  background:rgba(217,160,64,0.03)}
.event-timeline{border-left:2px solid var(--gold-dim);padding-left:12px}
.event-item{position:relative;padding-bottom:7px;font-size:11px;color:rgba(221,213,196,0.72);
  line-height:1.4;font-family:'Noto Sans',sans-serif}
.event-item::before{content:'';position:absolute;left:-17px;top:4px;width:7px;height:7px;
  border-radius:50%;background:rgba(201,168,76,0.45);border:2px solid var(--gold-dim)}
.event-item.highlight{color:var(--gold);font-weight:600}
.event-item.highlight::before{background:var(--gold);box-shadow:0 0 6px rgba(201,168,76,0.5)}

.war-detail-box{padding:12px;background:rgba(217,64,64,0.06);border:1px solid var(--red-dim);
  border-radius:8px;margin-bottom:10px}
.war-detail-box .wtitle{font-family:'Cinzel',serif;font-size:15px;color:#f87171;margin-bottom:4px}
.war-detail-box .wmeta{font-size:12px;color:var(--text);margin-bottom:3px}
.war-detail-box .wsides{margin-top:8px;font-size:11px;color:rgba(221,213,196,0.65)}

#timeline{flex-shrink:0;padding:6px 16px 10px;
  background:linear-gradient(0deg,rgba(8,12,20,0.99),rgba(14,21,32,0.96));
  border-top:1px solid var(--gold-dim);z-index:20}
#timeline-controls{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.ctrl-btn{background:rgba(201,168,76,0.08);border:1px solid var(--gold-dim);color:var(--gold);
  cursor:pointer;padding:4px 10px;border-radius:4px;font-family:'Cinzel',serif;font-size:12px;
  transition:all 0.2s;user-select:none}
.ctrl-btn:hover{background:rgba(201,168,76,0.18)}
.ctrl-btn.play{background:rgba(74,170,153,0.12);border-color:rgba(74,170,153,0.35);color:#6ee7b7}
.ctrl-btn.pause{background:rgba(217,64,64,0.12);border-color:rgba(217,64,64,0.35);color:#fca5a5}
#speed-control{display:flex;align-items:center;gap:5px;margin-left:8px;font-size:10px;color:var(--text-dim)}
#speed-slider{width:60px;accent-color:var(--gold);height:3px}
#period-counter{font-size:10px;color:var(--text-dim);margin-left:auto}

#timeline-bar{position:relative;display:flex;align-items:center;height:36px}
#timeline-track{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(201,168,76,0.1);transform:translateY(-50%)}
#timeline-progress{position:absolute;top:50%;left:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-bright));
  transform:translateY(-50%);transition:width 0.4s}
.tl-dot{position:absolute;top:50%;transform:translate(-50%,-50%);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;z-index:2;transition:all 0.3s}
.tl-dot .d{width:8px;height:8px;border-radius:50%;transition:all 0.3s;border:2px solid transparent}
.tl-dot.active .d{width:14px;height:14px;background:var(--gold);
  border:3px solid rgba(201,168,76,0.35);box-shadow:0 0 10px rgba(201,168,76,0.45)}
.tl-dot.passed .d{background:var(--gold)}
.tl-dot.future .d{background:rgba(100,116,139,0.35)}
.tl-dot .lbl{font-family:'Cinzel',serif;font-size:7px;margin-top:3px;white-space:nowrap;transition:all 0.3s;color:var(--text-dim)}
.tl-dot.active .lbl{font-size:9px;color:var(--gold);font-weight:700}

@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:0.7}}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.6);opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes warPulse{0%,100%{opacity:0.65}50%{opacity:1}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(201,168,76,0.15)}50%{box-shadow:0 0 18px rgba(201,168,76,0.4)}}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.2)}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.25);border-radius:3px}

@media(max-width:900px){
  #detail-panel.open{width:100%;position:absolute;top:0;right:0;bottom:0;z-index:30}
  #info-box.shifted{right:12px}
  .marker-label{font-size:7px}
  #era-badge{font-size:9px;max-width:180px}
  #header h1{font-size:12px;letter-spacing:2px}
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <h1>⚔ Türk Tarihi Atlası</h1>
      <div class="sub">MÖ 220'DEN CUMHURİYET'E • KPSS TARİH KRONOLOJİ</div>
    </div>
    <div id="era-badge"></div>
  </div>
  <div id="main">
    <div id="map-container">
      <div id="map-scaler">
        <div id="map-svg-wrap"></div>
        <div id="map-overlay"></div>
        <div id="legend">
          <div class="item"><div class="dot" style="background:var(--gold);box-shadow:0 0 5px rgba(201,168,76,0.5)"></div><span style="color:var(--gold)">Türk Devleti</span></div>
          <div class="item"><div class="dot" style="background:#4a9;box-shadow:0 0 5px rgba(74,170,153,0.4)"></div><span style="color:#6ee7b7">Türk-İslam Devleti</span></div>
          <div class="item"><div class="dot" style="background:#f0a050"></div><span style="color:#f0a050">Diğer Türk Devleti</span></div>
          <div class="item"><div class="dot" style="background:var(--enemy)"></div><span style="color:#9ab">Diğer Devletler</span></div>
          <div class="item"><div class="dot" style="background:var(--red)"></div><span style="color:#f87171">Savaş / Çatışma</span></div>
          <div style="margin-top:3px;color:var(--text-dim);font-size:9px;font-style:italic">Devletlere ve savaşlara tıklayın</div>
        </div>
        <div id="info-box">
          <h2 id="info-era"></h2>
          <p id="info-desc"></p>
          <div id="info-wars"></div>
        </div>
      </div>
    </div>
    <div id="detail-panel">
      <div id="detail-header">
        <h3 id="detail-title"></h3>
        <button id="detail-close" onclick="closePanel()">✕ Kapat</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>
  <div id="timeline">
    <div id="timeline-controls">
      <button class="ctrl-btn" onclick="prevPeriod()">◀</button>
      <button class="ctrl-btn play" id="play-btn" onclick="togglePlay()">▶ Oynat</button>
      <button class="ctrl-btn" onclick="nextPeriod()">▶</button>
      <div id="speed-control">
        <span>Hız:</span>
        <input type="range" id="speed-slider" min="1" max="10" value="4" oninput="updateSpeed()">
        <span id="speed-label">4s</span>
      </div>
      <div id="period-counter"></div>
    </div>
    <div id="timeline-bar"></div>
  </div>
</div>

<script>
// ====== GEO PROJECTION ======
function geoToPercent(lat, lon) {
  const xPct = (lon + 180) / 3.6;
  let yPct;
  if (lat > 60) yPct = 11.6 - (lat - 60) * 0.72;
  else if (lat > 40) yPct = 26 - (lat - 40) * 0.72;
  else if (lat > 20) yPct = 44.3 - (lat - 20) * 0.915;
  else if (lat > 0) yPct = 56.8 - lat * 0.625;
  else if (lat > -20) yPct = 56.8 - lat * 0.59;
  else yPct = 68.6 - (lat + 20) * 0.65;
  return { x: xPct, y: yPct };
}

// ====== SVG ÜLKE BOYAMA - FIX: hem name hem class ile arama ======
function colorCountry(countryName, fillColor) {
  // 1) name attribute ile
  let paths = document.querySelectorAll(`#map-svg-wrap svg path[name="${countryName}"]`);
  paths.forEach(p => p.style.fill = fillColor);
  // 2) class attribute ile (Turkey, Russia, China, France, Italy, Greece, UK vs.)
  const escaped = CSS.escape(countryName);
  let classPaths = document.querySelectorAll(`#map-svg-wrap svg path.${escaped}`);
  classPaths.forEach(p => p.style.fill = fillColor);
}

// Renk paletleri: farklı Türk devletleri için
const TURK_COLORS = {
  'turk':      'rgba(201, 168, 76, 0.7)',
  'turk-islam':'rgba(74, 170, 130, 0.65)',
  'turk2':     'rgba(240, 160, 80, 0.65)',
  'turk3':     'rgba(220, 100, 140, 0.6)',
  'turk4':     'rgba(96, 180, 230, 0.6)',
  'turk5':     'rgba(180, 130, 230, 0.6)',
};
const ENEMY_COLOR = 'rgba(122, 139, 160, 0.55)';

// ====== DATA ======
const PERIODS = [
{
  year:-220, label:"MÖ 220", era:"Büyük (Asya) Hun İmparatorluğu",
  description:"Teoman tarafından kurulan, Mete Han döneminde en parlak çağını yaşayan tarihte bilinen ilk büyük Türk devleti.",
  states:[
    {name:"Büyük Hun İmp.",type:"turk",lat:47,lon:104,capital:"Ötüken",
      territories:["Mongolia","Kazakhstan","Kyrgyzstan"],
      details:{
        period:"MÖ 220 – MS 216",
        significance:"Tarihte bilinen ilk büyük Türk devleti. Mete Han'ın kurduğu onlu (desimal) askeri sistem, yüzyıllar boyunca tüm Türk devletlerinde kullanıldı. İkili devlet teşkilatı (Doğu-Batı) geleneğini başlattı. Çin'i vergiye bağlayarak Türk askeri gücünü dünyaya kanıtladı.",
        leaders:["Teoman (İlk hükümdar, MÖ 220)","Mete Han (MÖ 209-174)","Ki-ok","Ho-han-yeh"],
        achievements:["Tarihte bilinen ilk büyük Türk devleti","Onlu (desimal) askeri sistem – Mete Han","İlk düzenli Türk ordusu","Boylar federasyonu (İkili Devlet Teşkilatı)","İpek Yolu kontrolü","Çin'i vergiye bağlama (MÖ 200, Baideng)"],
        culture:["Gök Tanrı inancı","Kurgan kültürü","At kültürü ve atlı göçebe yaşam","Hayvan üslubu sanatı"],

    {from:"TBMM Hükümeti",to:"Yunanistan",name:"Sakarya Meydan Muharebesi",year:"Ağu-Eyl 1921",result:"Büyük zafer – Savaşın dönüm noktası"},
    {from:"TBMM Hükümeti",to:"Yunanistan",name:"BÜYÜK TAARRUZ",year:"26 Ağustos 1922",result:"Kesin zafer – Düşman denize döküldü"},
    {from:"TBMM Hükümeti",to:"Ermenistan",name:"Doğu Cephesi",year:"1920",result:"Gümrü Antlaşması – Doğu sınırı güvence altında"}
  ]
}
];

// ====== STATE ======
let currentIdx = 0, playing = false, playInterval = null, speed = 4000;

// ====== DOM REFS ======
const overlay = document.getElementById('map-overlay');
const eraBadge = document.getElementById('era-badge');
const infoEra = document.getElementById('info-era');
const infoDesc = document.getElementById('info-desc');
const infoWars = document.getElementById('info-wars');
const infoBox = document.getElementById('info-box');
const detailPanel = document.getElementById('detail-panel');
const detailTitle = document.getElementById('detail-title');
const detailContent = document.getElementById('detail-content');
const playBtn = document.getElementById('play-btn');
const periodCounter = document.getElementById('period-counter');
const timelineBar = document.getElementById('timeline-bar');
const speedSlider = document.getElementById('speed-slider');
const speedLabel = document.getElementById('speed-label');
const mapSvgWrap = document.getElementById('map-svg-wrap');

// ====== LOAD SVG MAP ======
fetch('world.svg').then(r=>r.text()).then(svg=>{mapSvgWrap.innerHTML=svg;render();}).catch(()=>{
  mapSvgWrap.innerHTML='<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:40px">world.svg yüklenemedi – Harita dosyasını aynı klasöre koyun</div>';
});

// ====== RENDER ======
function render() {
  const p = PERIODS[currentIdx];
  eraBadge.innerHTML = `<div style="font-size:11px;opacity:0.6">${p.label}</div>${p.era}`;
  infoEra.textContent = p.era;
  infoDesc.textContent = p.description;
  periodCounter.textContent = `${currentIdx+1} / ${PERIODS.length}`;
  
  infoWars.innerHTML = '';
  p.wars.forEach(w => {
    const tag = document.createElement('div');
    tag.className = 'info-war-tag';
    tag.textContent = `⚔ ${w.name} (${w.year})`;
    tag.onclick = () => showWarDetail(w);
    infoWars.appendChild(tag);
  });
  
  renderTimeline();
  overlay.innerHTML = '';
  
  // Tüm haritayı sıfırla
  document.querySelectorAll('#map-svg-wrap svg path').forEach(path => {
    path.style.fill = '#2a3441';
  });

  // Türk devletlerinin topraklarını boya
  if(p.states) {
    p.states.forEach(state => {
      const fillColor = TURK_COLORS[state.type] || TURK_COLORS['turk'];
      if(state.territories) {
        state.territories.forEach(cn => colorCountry(cn, fillColor));
      }
      if(state.lat && state.lon) {
        overlay.appendChild(createMarker(state, geoToPercent(state.lat, state.lon), state.type));
      }
    });
  }

  // Düşman devletlerin topraklarını boya
  if(p.enemies) {
    p.enemies.forEach(enemy => {
      if(enemy.territories) {
        enemy.territories.forEach(cn => colorCountry(cn, ENEMY_COLOR));
      }
      if(enemy.lat && enemy.lon) {
        overlay.appendChild(createMarker(enemy, geoToPercent(enemy.lat, enemy.lon), enemy.type || 'enemy'));
      }
    });
  }

  // Savaş çizgileri ve rozetleri
  const allStates = [...(p.states||[]), ...(p.enemies||[])];
  if(p.wars) {
    p.wars.forEach(w => {
      const fromS = allStates.find(s=>s.name===w.from);
      const toS = allStates.find(s=>s.name===w.to);
      if(!fromS||!toS) return;
      const fp = geoToPercent(fromS.lat, fromS.lon);
      const tp = geoToPercent(toS.lat, toS.lon);
      
      const svgNs = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNs,'svg');
      svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;overflow:visible';
      const line = document.createElementNS(svgNs,'line');
      line.setAttribute('x1', fp.x+'%');line.setAttribute('y1', fp.y+'%');
      line.setAttribute('x2', tp.x+'%');line.setAttribute('y2', tp.y+'%');
      line.setAttribute('stroke','rgba(217,64,64,0.6)');
      line.setAttribute('stroke-width','2');
      line.setAttribute('stroke-dasharray','6,4');
      svg.appendChild(line);
      overlay.appendChild(svg);
      
      const badge = document.createElement('div');
      badge.className = 'war-badge';
      badge.style.left = ((fp.x+tp.x)/2)+'%';
      badge.style.top = ((fp.y+tp.y)/2)+'%';
      badge.textContent = '⚔ '+ (w.name.length > 28 ? w.name.substring(0,28)+'…' : w.name);
      badge.onclick = () => showWarDetail(w);
      overlay.appendChild(badge);
    });
  }
  
  infoBox.className = detailPanel.classList.contains('open') ? 'shifted' : '';
}

function createMarker(state, pos, type) {
  const m = document.createElement('div');
  m.className = 'state-marker';
  m.style.left = pos.x + '%';
  m.style.top = pos.y + '%';
  
  const dot = document.createElement('div');
  dot.className = 'marker-dot ' + type;
  m.appendChild(dot);
  
  if(type!=='enemy') {
    const ring = document.createElement('div');
    ring.className = 'marker-ring ' + type;
    m.appendChild(ring);
  }
  
  const label = document.createElement('div');
  label.className = 'marker-label ' + type;
  label.textContent = state.name;
  m.appendChild(label);

  if(state.capital) {
    const cap = document.createElement('div');
    cap.className = 'capital-label';
    cap.textContent = '📍 ' + state.capital;
    m.appendChild(cap);
  }
  
  m.onclick = () => showStateDetail(state, type);
  return m;
}

function renderTimeline() {
  timelineBar.innerHTML = '';
  const track = document.createElement('div');
  track.id = 'timeline-track';
  timelineBar.appendChild(track);
  const prog = document.createElement('div');
  prog.id = 'timeline-progress';
  prog.style.width = (currentIdx/(PERIODS.length-1)*100)+'%';
  timelineBar.appendChild(prog);
  PERIODS.forEach((p,i) => {
    const dot = document.createElement('div');
    dot.className = 'tl-dot ' + (i===currentIdx?'active':i<currentIdx?'passed':'future');
    dot.style.left = (i/(PERIODS.length-1)*100)+'%';
    const d = document.createElement('div');
    d.className = 'd';
    dot.appendChild(d);
    const lbl = document.createElement('div');
    lbl.className = 'lbl';
    lbl.textContent = p.label;
    dot.appendChild(lbl);
    dot.onclick = () => { currentIdx = i; playing && togglePlay(); render(); };
    timelineBar.appendChild(dot);
  });
}

// ====== DETAIL PANEL ======
function showStateDetail(state, type) {
  const d = state.details;
  if(!d) return;
  
  const colorMap = {turk:'var(--gold)','turk-islam':'#6ee7b7',enemy:'#94a3b8',turk2:'#f0a050',turk3:'#e06090',turk4:'#60c0f0',turk5:'#c090f0'};
  const color = colorMap[type]||'#94a3b8';
  
  detailTitle.style.color = color;
  detailTitle.textContent = state.name;
  
  let html = '';
  
  if(d.period) html += `<div class="detail-period"><div class="label">DÖNEM</div><div class="value">${d.period}</div></div>`;
  if(state.capital) html += `<div class="detail-capital">📍 Başkent: <strong>${state.capital}</strong></div>`;
  if(d.significance) html += `<div class="detail-significance">📖 ${d.significance}</div>`;
  
  if(d.leaders&&d.leaders.length) {
    html += `<div class="detail-section"><div class="detail-section-title">👑 Liderler</div><div class="tag-list">`;
    d.leaders.forEach(l => html += `<span class="tag leader">${l}</span>`);
    html += `</div></div>`;
  }
  
  if(d.achievements&&d.achievements.length) {
    html += `<div class="detail-section"><div class="detail-section-title">🏛 Başarılar & Katkılar</div>`;
    d.achievements.forEach(a => html += `<div class="achievement-item">${a}</div>`);
    html += `</div>`;
  }
  
  if(d.culture&&d.culture.length) {
    html += `<div class="detail-section"><div class="detail-section-title">🎨 Kültür & Medeniyet</div><div class="tag-list">`;
    d.culture.forEach(c => html += `<span class="tag culture">${c}</span>`);
    html += `</div></div>`;
  }
  
  if(d.scientists&&d.scientists.length) {
    html += `<div class="detail-section"><div class="detail-section-title">📚 Bilim & Düşünce İnsanları</div>`;
    d.scientists.forEach(s => {
      if(typeof s === 'object') {
        html += `<div class="scientist-item"><span class="sci-name">${s.name}</span><span class="sci-work">${s.work}</span>`;
        if(s.patron) html += `<span class="sci-work" style="color:rgba(201,168,76,0.6)">⟶ ${s.patron}</span>`;
        html += `</div>`;
      } else {
        html += `<div class="scientist-item"><span class="sci-name">${s}</span></div>`;
      }
    });
    html += `</div>`;
  }
  
  if(d.architecture&&d.architecture.length) {
    html += `<div class="detail-section"><div class="detail-section-title">🕌 Önemli Mimari Yapıtlar</div>`;
    d.architecture.forEach(a => html += `<div class="arch-item">${a}</div>`);
    html += `</div>`;
  }
  
  if(d.events&&d.events.length) {
    html += `<div class="detail-section"><div class="detail-section-title">📜 Önemli Olaylar</div><div class="event-timeline">`;
    d.events.forEach(e => {
      const isHL = /MALAZGİRT|İSTANBUL|ÇANAKKALE|BÜYÜK TAARRUZ|CUMHURİYET|TBMM|KOSOVA|SAKARYA|MONDROS|SEVR|BAŞKOMUTAN|KARLOFÇA|KÜÇÜK KAYNARCA/.test(e) || e === e.toUpperCase();
      html += `<div class="event-item${isHL?' highlight':''}">${e}</div>`;
    });
    html += `</div></div>`;
  }
  
  detailContent.innerHTML = html;
  detailPanel.classList.add('open');
  infoBox.classList.add('shifted');
}

function showWarDetail(war) {
  detailTitle.style.color = '#f87171';
  detailTitle.textContent = '⚔ ' + war.name;
  
  let html = `<div class="war-detail-box">
    <div class="wtitle">${war.name}</div>
    <div class="wmeta">📅 <strong>${war.year}</strong></div>
    ${war.result?`<div class="wmeta">🏁 ${war.result}</div>`:''}
    <div class="wsides" style="margin-top:10px">
      <span style="color:var(--gold)">${war.from}</span> ⚔ <span style="color:#94a3b8">${war.to}</span>
    </div>
  </div>`;
  
  detailContent.innerHTML = html;
  detailPanel.classList.add('open');
  infoBox.classList.add('shifted');
}

function closePanel() {
  detailPanel.classList.remove('open');
  infoBox.classList.remove('shifted');
}

// ====== CONTROLS ======
function prevPeriod() { if(currentIdx>0){currentIdx--;closePanel();render();} }
function nextPeriod() { if(currentIdx<PERIODS.length-1){currentIdx++;closePanel();render();} }

function togglePlay() {
  playing = !playing;
  if(playing) {
    playBtn.textContent = '⏸ Durdur';
    playBtn.className = 'ctrl-btn pause';
    playInterval = setInterval(()=>{
      if(currentIdx>=PERIODS.length-1){togglePlay();return;}
      currentIdx++;closePanel();render();
    }, speed);
  } else {
    playBtn.textContent = '▶ Oynat';
    playBtn.className = 'ctrl-btn play';
    clearInterval(playInterval);
  }
}

function updateSpeed() {
  speed = speedSlider.value * 1000;
  speedLabel.textContent = speedSlider.value + 's';
  if(playing) { clearInterval(playInterval); togglePlay(); togglePlay(); }
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight') nextPeriod();
  else if(e.key==='ArrowLeft') prevPeriod();
  else if(e.key===' ') { e.preventDefault(); togglePlay(); }
  else if(e.key==='Escape') closePanel();
});

// İlk render SVG yüklenmeden de çalışsın
render();
</script>
</body>
</html>
